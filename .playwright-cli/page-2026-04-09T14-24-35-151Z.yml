            - text: em vulnerabilidades críticas, evidenciando uma expansão progressiva da faixa na qual se concentram as recompensas mais frequentes. Esse comportamento indica que vulnerabilidades mais severas estão associadas não apenas a valores mais elevados, mas também a maior incerteza econômica quanto à sua precificação.
          - paragraph [ref=e184]
          - paragraph [ref=e185]:
            - strong [ref=e186]: "Figura 5:"
            - text: mediana de recompensas por severidade em programas públicos vs privados.
          - paragraph [ref=e187]: Em conjunto, os resultados demonstram que, embora existam padrões consistentes de precificação por severidade, o mercado de bug bounty apresenta elevada heterogeneidade e presença recorrente de valores extremos. Ainda assim, as estatísticas de tendência central e dispersão permitem afirmar que a descoberta de vulnerabilidades possui um valor econômico observável e diferenciado por nível de severidade.
          - paragraph [ref=e188]:
            - text: Assim, é metodologicamente adequado afirmar faixas de custo por severidade, desde que essas faixas sejam definidas a partir de medidas robustas, como a mediana e o intervalo interquartil, e não interpretadas como limites determinísticos. Com base nos dados analisados, a descoberta de vulnerabilidades de baixa severidade apresenta custo típico concentrado entre aproximadamente
            - strong [ref=e189]: USD 59 e USD 200
            - text: ", com mediana de"
            - strong [ref=e190]: USD 100
            - text: . Para severidade média, a faixa típica situa-se entre
            - strong [ref=e191]: USD 200 e USD 500
            - text: ", com mediana em torno de"
            - strong [ref=e192]: USD 350
            - text: . Vulnerabilidades de alta severidade apresentam maior dispersão, com valores concentrados entre
            - strong [ref=e193]: USD 590 e USD 2.000
            - text: ", e mediana de"
            - strong [ref=e194]: USD 1.000
            - text: ", enquanto vulnerabilidades críticas exibem as maiores faixas de custo, aproximadamente entre"
            - strong [ref=e195]: USD 1.500 e USD 5.000
            - text: ", com mediana de"
            - strong [ref=e196]: USD 3.000
            - text: . Essas faixas refletem o comportamento típico do mercado e evidenciam o aumento progressivo da incerteza econômica conforme a severidade da vulnerabilidade cresce.
          - heading "Conclusão" [level=3] [ref=e197]
          - paragraph [ref=e198]: Este estudo investigou a economia das recompensas (payouts) por vulnerabilidade a partir de uma abordagem quantitativa baseada em dados reais de programas de bug bounty. Neste contexto, “custo” refere-se ao valor pago pelas organizações por relatórios de vulnerabilidade aceitos, e não ao custo operacional do pesquisador para descobrir e reportar vulnerabilidades. Partindo da premissa de que tais programas funcionam como mecanismos de mercado sob assimetria de informação, a análise buscou estimar de forma objetiva como os valores de payout variam conforme sua severidade.
          - paragraph [ref=e199]: Os resultados demonstram que a descoberta de vulnerabilidades possui um valor econômico observável e sistematicamente diferenciado por severidade. As análises estatísticas evidenciaram distribuições fortemente assimétricas em todas as categorias, com presença recorrente de valores extremos, o que torna a média aritmética inadequada como medida representativa isolada. Em contraste, medidas robustas como a mediana e o intervalo interquartil mostraram-se mais apropriadas para capturar o comportamento típico do mercado.
          - paragraph [ref=e200]:
            - text: Com base nesses indicadores, foi possível estimar faixas típicas de payout associadas à descoberta de vulnerabilidades. Vulnerabilidades de baixa severidade apresentam valores concentrados entre aproximadamente
            - strong [ref=e201]: USD 59 e USD 200
            - text: ", com mediana de"
