            - text: . Para severidade média, a faixa típica situa-se entre
            - strong [ref=e203]: USD 200 e USD 500
            - text: ", com mediana em torno de"
            - strong [ref=e204]: USD 350
            - text: . Vulnerabilidades de alta severidade concentram-se entre
            - strong [ref=e205]: USD 590 e USD 2.000
            - text: ", com mediana de"
            - strong [ref=e206]: USD 1.000
            - text: ", enquanto vulnerabilidades críticas apresentam as maiores faixas de payout, entre aproximadamente"
            - strong [ref=e207]: USD 1.500 e USD 5.000
            - text: ", com mediana de"
            - strong [ref=e208]: USD 3.000
            - text: . Essas faixas refletem o comportamento típico do mercado e evidenciam o aumento progressivo da variabilidade econômica conforme a severidade cresce.
          - paragraph [ref=e209]: Sob a perspectiva econômica, esses achados reforçam a interpretação de programas de bug bounty como mercados de incentivos, nos quais as recompensas funcionam como sinais que equilibram a oferta de esforço especializado por parte dos pesquisadores e a demanda por descoberta de falhas por parte das organizações. Nesse ambiente, pesquisadores tendem a direcionar esforço apenas quando o retorno esperado excede seu custo marginal, o que sustenta a lógica de lucro e continuidade da operação. A assimetria informacional, embora presente, é disciplinada pela migração entre programas e tende a permanecer em patamares baixos e aceitáveis. Embora tais recompensas não representem o custo total associado à existência ou exploração de uma vulnerabilidade, elas constituem um proxy empírico padronizado para o payout organizacional associado à sua identificação e reporte.
          - paragraph [ref=e210]:
            - text: Do ponto de vista prático, a estimativa do
            - strong [ref=e211]: Expected Vulnerability Discovery Cost (EVDC)
            - text: por severidade oferece subsídios objetivos para apoiar decisões de priorização, planejamento orçamentário e avaliação de investimentos em segurança da informação. Ao traduzir vulnerabilidades em faixas econômicas mensuráveis, o estudo contribui para reduzir a dependência exclusiva de avaliações qualitativas e aproxima a gestão de vulnerabilidades de uma lógica econômica comparável a outros investimentos em tecnologia e risco.
          - paragraph [ref=e212]: Por fim, embora limitado ao escopo da descoberta e a programas de bug bounty, este trabalho estabelece uma base empírica para futuras pesquisas que explorem a relação entre custo de descoberta, custo de correção e impacto de exploração, bem como para comparações com outros modelos de investimento em segurança. Nesse sentido, a análise apresentada não busca fornecer valores determinísticos, mas oferecer referências econômicas robustas para compreender e discutir o custo das vulnerabilidades em ambientes digitais contemporâneos.
