            - strong [ref=e108]: "Figura 2:"
            - text: distribuição de programas de bug bounty por tipo de visibilidade (público vs privado).
          - paragraph [ref=e109]: A tabela a seguir apresenta os valores mínimos e máximos de recompensa observados em cada categoria de severidade, evidenciando a ampla variação existente entre programas e plataformas. Em particular, nota-se que, embora vulnerabilidades de baixa severidade apresentem recompensas mínimas simbólicas, as faixas superiores — especialmente para severidades altas e críticas — alcançam valores significativamente elevados, refletindo diferentes estratégias de incentivo e percepção de risco.
