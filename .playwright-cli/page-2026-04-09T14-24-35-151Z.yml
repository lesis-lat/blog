          - paragraph [ref=e135]: Esses valores delimitam a faixa completa de variação dos dados observados, servindo como base para análises estatísticas mais robustas.
          - paragraph [ref=e136]: Complementarmente, a análise de tendência central revela padrões mais estáveis de precificação por severidade. A tabela a seguir apresenta os valores de média, mediana e moda, indicando que, apesar da presença de outliers relevantes, a concentração das recompensas ocorre em patamares bem definidos para cada categoria.
