            - text: ), evidenciando distribuições fortemente concentradas em valores baixos, com poucos pagamentos excepcionalmente altos. Embora a intensidade da assimetria varie entre severidades — com destaque para vulnerabilidades de severidade média — esse padrão explica a divergência sistemática entre média e mediana e confirma a
            - strong [ref=e174]: sensibilidade da média a valores extremos
            - text: ", tornando medidas robustas mais adequadas para a interpretação dos dados."
          - paragraph [ref=e175]
