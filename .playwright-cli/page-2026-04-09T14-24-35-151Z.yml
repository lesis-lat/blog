        - heading "Taxonomia econômica de vulnerabilidades" [level=1] [ref=e15]
        - paragraph [ref=e16]:
          - time [ref=e17]: 8 de fevereiro de 2026
          - text: •
          - generic [ref=e18]: Heitor Gouvêa
          - text: "• Tempo de leitura: 9 mins"
      - generic [ref=e19]:
        - generic [ref=e20]:
          - paragraph [ref=e21]: "No campo da cibersegurança, uma das perguntas mais relevantes — e, simultaneamente, uma das mais difíceis de responder com precisão — é: qual é o custo financeiro de uma vulnerabilidade? Embora existam diversos programas e práticas voltadas ao gerenciamento de vulnerabilidades, o desafio de atribuir um valor monetário a cada falha, especialmente quando ainda não explorada, permanece pouco abordado sob uma ótica objetiva e quantitativa."
          - paragraph [ref=e22]: Com o aumento da sofisticação dos ataques, das exigências regulatórias e da complexidade dos ecossistemas digitais contemporâneos, torna-se fundamental compreender o custo real de uma vulnerabilidade. Tal compreensão possibilita que decisões estratégicas em segurança da informação sejam fundamentadas não apenas em percepções de risco, mas também em análises econômicas tangíveis.
          - heading "Contexto e dados analíticos" [level=3] [ref=e23]
          - paragraph [ref=e24]: Historicamente, decisões relacionadas à priorização e ao investimento em segurança têm se baseado em avaliações qualitativas e modelos de risco construídos a partir de cenários hipotéticos. Embora úteis, essas abordagens nem sempre oferecem argumentos sólidos para justificar a alocação de recursos frente a áreas como finanças, produto ou liderança executiva.
          - paragraph [ref=e25]:
            - text: Nesse cenário, surge a necessidade de uma análise centrada na
            - strong [ref=e26]: mensuração econômica das vulnerabilidades
            - text: ", utilizando dados reais. A partir de uma nova análise de dados, este estudo busca responder com maior precisão à seguinte questão:"
          - paragraph [ref=e27]:
            - strong [ref=e28]: Qual é o custo de uma vulnerabilidade, considerando diferentes níveis de severidade e categorias?
          - paragraph [ref=e29]: A resposta a essa pergunta fornecerá subsídios importantes para estratégias de priorização, definição orçamentária e tomada de decisão em segurança da informação.
          - heading "Premissas" [level=3] [ref=e30]
          - paragraph [ref=e31]: A fim de conduzir a análise de forma objetiva, clara e relevante para a tomada de decisão, estabeleceram-se as seguintes premissas, que delimitam o escopo do estudo e fundamentam a abordagem metodológica adotada.
          - paragraph [ref=e32]:
            - strong [ref=e33]: 1. Vulnerabilidades possuem valor econômico mensurável
            - text: ": cada vulnerabilidade pode ser associada a um valor monetário, refletindo o esforço necessário para sua descoberta e reporte, bem como os riscos que ela representa. Programas de"
            - emphasis [ref=e34]: bug bounty
            - text: são considerados referência de mercado para essa mensuração.
          - paragraph [ref=e35]:
            - strong [ref=e36]: 2. O valor de uma vulnerabilidade cresce conforme sua severidade
            - text: ": assume-se que a severidade de uma vulnerabilidade — determinada pelo impacto e pela probabilidade de exploração — está diretamente relacionada ao seu custo. Vulnerabilidades críticas tendem a implicar riscos maiores e, portanto, custos mais elevados."
          - paragraph [ref=e37]:
            - strong [ref=e38]: 3. Recompensas de bug bounty são proxies válidos para estimativa de custo
            - text: ": os valores pagos em programas de bug bounty são utilizados como estimativas conservadoras para o custo de descoberta de uma vulnerabilidade. Para maior rigor, adotar-se-á sempre o menor valor dentro de cada faixa divulgada."
          - paragraph [ref=e39]:
            - strong [ref=e40]: 4. O foco está exclusivamente na fase de descoberta da vulnerabilidade
            - text: ": a análise não contempla etapas subsequentes do ciclo de vida da vulnerabilidade (como correção, revalidação, comunicação ou impacto da exploração), concentrando-se unicamente no custo estimado para sua identificação."
          - paragraph [ref=e41]:
            - strong [ref=e42]: 5. Recursos de segurança são limitados e exigem alocação estratégica
            - text: ": partindo do princípio de que os orçamentos em segurança são finitos, compreender o custo unitário das vulnerabilidades permite decisões mais eficazes quanto à alocação de esforços e investimentos."
          - heading "Fora de escopo" [level=3] [ref=e43]
          - paragraph [ref=e44]: "Embora relevantes, os seguintes tópicos não fazem parte do escopo deste estudo:"
          - paragraph [ref=e45]:
            - strong [ref=e46]: 1. Elaboração de uma estratégia completa de gerenciamento de vulnerabilidades
            - text: ": esse documento não propõe um framework completo de gestão de vulnerabilidades, restringindo-se à análise de custo de identificação. Questões como priorização de correções, políticas de remediação, processos de resposta ou integração com sistemas de gestão de riscos não serão abordadas."
          - paragraph [ref=e47]:
            - strong [ref=e48]: 2. Avaliação ou comparação de fornecedores, ferramentas ou métodos específicos
            - text: ": não se objetiva comparar soluções ou recomendar plataformas. Dados de bug bounty são utilizados exclusivamente como insumo empírico para estimativa de custo, sem juízo de valor sobre sua efetividade ou eficiência em comparação a outras abordagens."
          - paragraph [ref=e49]:
            - strong [ref=e50]: 3. Estimativas de impacto financeiro de incidentes reais
            - text: ": não serão modeladas consequências financeiras de explorações bem-sucedidas, como vazamentos de dados, interrupções operacionais, penalidades regulatórias ou perdas de reputação. O foco é a mensuração do custo de descoberta, não do impacto final de uma vulnerabilidade explorada."
          - paragraph [ref=e51]:
            - strong [ref=e52]: 4. Propostas orçamentárias ou recomendações diretas de alocação de recursos
            - text: ": embora os dados obtidos possam auxiliar na tomada de decisões sobre investimentos em segurança, não se propõe aqui qualquer recomendação prescritiva de alocação orçamentária. A aplicação prática dessas informações dependerá do contexto e das prioridades de cada organização."
          - paragraph [ref=e53]:
            - strong [ref=e54]:
              - text: 5. Análise de vulnerabilidades desconhecidas ou
              - emphasis [ref=e55]: zero-day
            - text: ": a análise se restringe a vulnerabilidades conhecidas e catalogadas. Questões relacionadas a falhas ainda não descobertas, incluindo aquelas exploradas por atores maliciosos antes da divulgação pública ("
            - emphasis [ref=e56]: zero-day
            - text: ), estão fora do escopo deste estudo.
          - heading "Abordagem" [level=3] [ref=e57]
          - paragraph [ref=e58]:
            - text: Inspirado pela teoria da assimetria de informação apresentada em
            - strong [ref=e59]:
              - emphasis [ref=e60]: "The Market for Lemons: Quality Uncertainty and the Market Mechanism"
            - text: "[1], este estudo parte do princípio de que mercados conseguem revelar preços mesmo em contextos de incerteza quanto à qualidade do bem transacionado, desde que existam mecanismos de sinalização minimamente estáveis."
          - paragraph [ref=e61]: No contexto da segurança da informação, programas de bug bounty funcionam como tais mecanismos, ao atribuírem valores monetários diferenciados a vulnerabilidades conforme sua severidade percebida. Assume-se, portanto, que as recompensas oferecidas refletem, de maneira conservadora, um valor de mercado associado à descoberta e ao reporte de falhas, mitigando parcialmente a assimetria entre quem identifica a vulnerabilidade e quem sofre seu risco. Com base nessa premissa, a metodologia adota uma abordagem quantitativa e comparativa, utilizando dados reais de programas de bug bounty para estimar níveis típicos de payout organizacional entre categorias de severidade.
          - paragraph [ref=e62]:
            - text: Embora tais recompensas não representem o custo total decorrente da existência ou exploração de uma vulnerabilidade, elas constituem um
            - emphasis [ref=e63]: proxy
            - text: padronizado e empiricamente observável para sua mensuração econômica. Sob a ótica da assimetria de informação, programas de bug bounty operam como mercados de incentivos, nos quais o preço sinaliza não apenas o valor percebido da vulnerabilidade, mas também o esforço esperado para sua descoberta. Nesse arranjo, pesquisadores independentes tendem a investir racionalmente apenas quando o valor esperado da recompensa líquida supera seus custos marginais de descoberta, validação e reporte, condição necessária para manter lucro e viabilidade operacional.
          - paragraph [ref=e64]: Quando os valores oferecidos são percebidos como insuficientes frente à complexidade da superfície de ataque ou aos requisitos de validação, a tendência é a redução do engajamento e do volume de relatórios submetidos. De forma simétrica, organizações ajustam dinamicamente os valores das recompensas como mecanismo de atração ou desincentivo, elevando-os quando há escassez de relatórios qualificados ou reduzindo-os quando a oferta de vulnerabilidades reportadas excede sua capacidade de triagem e correção.
          - paragraph [ref=e65]: Esse ciclo de entrada, saída e migração entre programas atua como mecanismo autocorretivo. Assim, embora a assimetria de informação não desapareça por completo, ela tende a permanecer em níveis residuais e operacionalmente aceitáveis, pois desequilíbrios persistentes entre esforço requerido e payout são rapidamente detectados pelos pesquisadores e precificados pelo mercado.
          - heading "Escopo da análise" [level=3] [ref=e66]
          - paragraph [ref=e67]: "A análise se restringe à etapa de descoberta da vulnerabilidade — isto é, ao esforço necessário para identificá-la e reportá-la com evidências técnicas. As fases de correção, revalidação e comunicação estão fora do escopo. Os dados são obtidos exclusivamente em fontes, priorizando:"
          - list [ref=e68]:
            - listitem [ref=e69]: Plataformas de bug bounty com informações abertas;
            - listitem [ref=e70]: Recompensas categorizadas por severidade;
            - listitem [ref=e71]: Diversas geografias, para maior representatividade.
          - heading "Justificativa da abordagem" [level=4] [ref=e72]
          - paragraph [ref=e73]: Ao utilizar dados de mercado — recompensas efetivamente pagas — evita-se a subjetividade típica das estimativas de impacto e se adota um critério reconhecido por diversos setores como referência prática de valor. Esse método também permite realizar comparações posteriores com outros modelos de investimento em segurança, como testes de intrusão (pentests) ou ferramentas automatizadas, fornecendo uma base concreta para avaliar retorno sobre investimento (ROI) e orientação de alocação de recursos.
          - heading "Metodologia" [level=3] [ref=e74]
          - paragraph [ref=e75]: "A metodologia adotada em neste estudo foi desenvolvida com o objetivo de garantir transparência, reprodutibilidade e consistência na análise dos dados extraídos de plataformas públicas de bug bounty. A seguir, são detalhadas as etapas principais do processo:"
          - list [ref=e76]:
            - listitem [ref=e77]: "A coleta de dados se dará pela utilização de scrapers próprios, desenvolvidos para extrair informações de programas ativos que:"
          - list [ref=e78]:
            - listitem [ref=e79]: Divulguem valores financeiros atribuídos a vulnerabilidades;
            - listitem [ref=e80]: Classifiquem claramente as falhas por severidade.
            - listitem [ref=e81]: Serão incluídos programas de empresas de diversos portes e setores, com abrangência nacional e internacional, a fim de capturar um panorama representativo do mercado.
          - list [ref=e82]:
            - listitem [ref=e83]: "Após a coleta, os dados são submetidos em um processo de filtragem, com os seguintes critérios de exclusão:"
          - list [ref=e84]:
            - listitem [ref=e85]: Programas do tipo VDP (Vulnerability Disclosure Program) que não oferecem recompensas financeiras;
            - listitem [ref=e86]: Programas com dados inconsistentes ou incompletos sobre severidade ou valores;
            - listitem [ref=e87]: Recompensas genéricas sem vinculação à severidade.
          - list [ref=e88]:
            - listitem [ref=e89]: "As recompensas são classificadas nas seguintes categorias, com base em descrições fornecidas pelos próprios programas ou, na ausência destas, segundo critérios compatíveis com o padrão CVSS:"
          - code [ref=e93]: Informativa Baixa Média Alta Crítica
          - list [ref=e94]:
            - listitem [ref=e95]: "Normalização dos valores, para evitar distorções nos resultados:"
          - list [ref=e96]:
            - listitem [ref=e97]: "Em faixas de valores (ex: $ 1.000 a $ 5.000), será utilizado o valor mínimo da faixa, adotando-se uma postura conservadora;"
            - listitem [ref=e98]: Todos os valores serão convertidos para dólar (USD), — com base em uma taxa de câmbio de referência.
          - heading "Análise" [level=3] [ref=e99]
          - paragraph [ref=e100]: Foram analisados 808 programas de bug bounty, distribuídos entre as plataformas HackerOne, Bugcrowd, YesWeHack, Intigriti, BugHunt e Bugpay. A amostra contempla programas ativos de organizações com diferentes portes, setores e localizações geográficas, oferecendo um panorama amplo e representativo do mercado de recompensas por vulnerabilidades.
          - paragraph [ref=e101]
          - paragraph [ref=e102]:
            - strong [ref=e103]: "Figura 1:"
            - text: distribuição de programas de bug bounty por plataforma.
          - paragraph [ref=e104]:
            - text: "Os dados utilizados nesta análise estão disponíveis para reprodução e verificação no repositório:"
            - link "https://huggingface.co/datasets/lesis-lat/bug-bounty-programs-rewards/viewer/default/train" [ref=e105] [cursor=pointer]:
              - /url: https://huggingface.co/datasets/lesis-lat/bug-bounty-programs-rewards/viewer/default/train
          - paragraph [ref=e106]
