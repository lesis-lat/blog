          - paragraph [ref=e170]:
            - text: A comparação entre média e mediana, à luz dos coeficientes de assimetria, indica que a média aritmética não representa adequadamente o comportamento típico das recompensas por vulnerabilidade. Todas as categorias de severidade apresentam
